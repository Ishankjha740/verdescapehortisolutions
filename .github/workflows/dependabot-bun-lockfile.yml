name: Refresh bun.lock for Dependabot

on:
  pull_request:
    paths:
      - "package.json"

permissions:
  contents: write
  pull-requests: read

jobs:
  refresh-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync bun.lock with updated package.json
        run: bun install --frozen-lockfile=false

      - name: Commit refreshed lockfile
        run: |
          if [ -n "$(git status --porcelain bun.lock)" ]; then
            git config user.name "dependabot[bot]"
            git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
            git add bun.lock
            git commit -m "chore: refresh bun.lock"
            git push
          fi